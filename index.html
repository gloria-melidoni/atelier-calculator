<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier Capacity Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; color: #1a1a18; padding: 2rem 1rem; min-height: 100vh; }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 2rem; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .sec-title { font-size: 11px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: .06em; margin: 0 0 .75rem; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .row label { font-size: 13px; color: #5f5e5a; width: 165px; flex-shrink: 0; }
  .row input[type=range] { flex: 1; accent-color: #378ADD; }
  .readout-group { display: flex; flex-direction: column; align-items: flex-end; min-width: 72px; }
  .readout-pct { font-size: 13px; font-weight: 500; color: #1a1a18; }
  .readout-abs { font-size: 11px; color: #888780; margin-top: 1px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .metric { background: #f5f4f0; border-radius: 8px; padding: .75rem 1rem; }
  .metric .label { font-size: 12px; color: #888780; margin-bottom: 4px; }
  .metric .val { font-size: 22px; font-weight: 500; color: #1a1a18; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .bar-label { font-size: 12px; color: #888780; width: 46px; }
  .bar-wrap { flex: 1; background: #f5f4f0; border-radius: 4px; height: 18px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .bar-val { font-size: 12px; font-weight: 500; min-width: 56px; text-align: right; color: #1a1a18; }
  .note { font-size: 12px; color: #888780; line-height: 1.6; margin-top: .75rem; }
  .highlight { background: #E6F1FB; border: 1px solid #B5D4F4; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .highlight .big { font-size: 36px; font-weight: 500; color: #185FA5; }
  .highlight .hl-label { font-size: 13px; color: #185FA5; margin-top: 2px; }
  .avg-box { background: #EAF3DE; border: 1px solid #C0DD97; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .avg-box .big { font-size: 28px; font-weight: 500; color: #3B6D11; }
  .avg-box .hl-label { font-size: 12px; color: #3B6D11; margin-top: 2px; }
  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1c; color: #e8e7e2; }
    .card { background: #2c2c2a; border-color: rgba(255,255,255,0.1); }
    .metric { background: #1e1e1c; }
    .metric .val, .bar-val, .readout-pct, h1 { color: #e8e7e2; }
    .bar-wrap { background: #1e1e1c; }
    .highlight { background: #0c3a6e; border-color: #185FA5; }
    .highlight .big, .highlight .hl-label { color: #85B7EB; }
    .avg-box { background: #1e3410; border-color: #3B6D11; }
    .avg-box .big, .avg-box .hl-label { color: #97C459; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Atelier capacity calculator</h1>
  <p class="subtitle">How many new pattern models can the team complete in a month?</p>

  <div class="highlight">
    <div class="big" id="hero-val">—</div>
    <div class="hl-label">new models completed this month</div>
  </div>

  <div class="card">
    <p class="sec-title">Working days</p>
    <div class="row">
      <label>Working days / month</label>
      <input type="range" min="18" max="23" step="1" value="22" id="days" />
      <div class="readout-group">
        <span class="readout-pct" id="days-out">22</span>
      </div>
    </div>

    <p class="sec-title" style="margin-top:.5rem;">Proto round rates</p>
    <div class="row">
      <label>% of styles → Proto 2</label>
      <input type="range" min="0" max="100" step="5" value="70" id="p2" />
      <div class="readout-group">
        <span class="readout-pct" id="p2-pct">70%</span>
        <span class="readout-abs" id="p2-abs">≈ — styles</span>
      </div>
    </div>
    <div class="row">
      <label>% of styles → Proto 3</label>
      <input type="range" min="0" max="100" step="5" value="30" id="p3" />
      <div class="readout-group">
        <span class="readout-pct" id="p3-pct">30%</span>
        <span class="readout-abs" id="p3-abs">≈ — styles</span>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="sec-title">Summary</p>
    <div class="grid3" id="cards"></div>
  </div>

  <div class="card">
    <p class="sec-title">New models by maker</p>
    <div id="bars"></div>
  </div>

  <div class="card">
    <p class="sec-title">How slots are used</p>
    <div class="grid2" id="slots"></div>
    <p class="note" id="note"></p>
  </div>

  <div class="avg-box">
    <div class="big" id="avg-range">—</div>
    <div class="hl-label">realistic monthly range (60–80% P2 / 25–40% P3)</div>
  </div>
</div>

<script>
const makers = [
  { name: 'Luc',    type: 'flou',   perWeek: 7, color: '#378ADD' },
  { name: 'George', type: 'tailor', perWeek: 2, color: '#1D9E75' },
  { name: 'Jay',    type: 'mixed',  perWeek: 7, color: '#BA7517' },
];

function calcNew(days, p2, p3) {
  const avgSlots = 1 + p2 + p3;
  const total = makers.reduce((s, m) => s + m.perWeek * (days / 5), 0);
  return total / avgSlots;
}

function calc() {
  const days = +document.getElementById('days').value;
  const p2   = +document.getElementById('p2').value / 100;
  const p3   = +document.getElementById('p3').value / 100;
  const avgSlots = 1 + p2 + p3;
  const weeksPerMonth = days / 5;

  const results = makers.map(m => {
    let flou = 0, tailor = 0;
    if (m.type === 'flou')   flou   = m.perWeek * weeksPerMonth;
    if (m.type === 'tailor') tailor = m.perWeek * weeksPerMonth;
    if (m.type === 'mixed')  { flou = (m.perWeek/2)*weeksPerMonth; tailor = flou; }
    const totalSlots = flou + tailor;
    const newModels = totalSlots / avgSlots;
    return { ...m, flou, tailor, totalSlots, newModels };
  });

  const totalFlou   = results.reduce((s,r) => s+r.flou, 0);
  const totalTailor = results.reduce((s,r) => s+r.tailor, 0);
  const totalSlots  = totalFlou + totalTailor;
  const totalNew    = totalSlots / avgSlots;

  document.getElementById('hero-val').textContent = Math.round(totalNew);

  document.getElementById('p2-abs').textContent = `≈ ${Math.round(totalNew * p2)} styles`;
  document.getElementById('p3-abs').textContent = `≈ ${Math.round(totalNew * p3)} styles`;

  document.getElementById('cards').innerHTML = `
    <div class="metric"><div class="label">New models</div><div class="val">${Math.round(totalNew)}</div></div>
    <div class="metric"><div class="label">Avg slots / style</div><div class="val">${avgSlots.toFixed(2)}</div></div>
    <div class="metric"><div class="label">Total slots</div><div class="val">${Math.round(totalSlots)}</div></div>
  `;

  document.getElementById('bars').innerHTML = results.map(r => `
    <div class="bar-row">
      <span class="bar-label">${r.name}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(r.newModels/totalNew*100).toFixed(1)}%;background:${r.color};"></div></div>
      <span class="bar-val">${Math.round(r.newModels)} styles</span>
    </div>
  `).join('');

  document.getElementById('slots').innerHTML = `
    <div class="metric"><div class="label">Flou slots</div><div class="val">${Math.round(totalFlou)}</div></div>
    <div class="metric"><div class="label">Tailor slots</div><div class="val">${Math.round(totalTailor)}</div></div>
    <div class="metric"><div class="label">Absorbed by P2</div><div class="val">${Math.round(totalNew * p2)}</div></div>
    <div class="metric"><div class="label">Absorbed by P3</div><div class="val">${Math.round(totalNew * p3)}</div></div>
  `;

  document.getElementById('note').textContent =
    `With ${Math.round(p2*100)}% going to Proto 2 and ${Math.round(p3*100)}% to Proto 3, each style consumes ${avgSlots.toFixed(2)} slots on average. ${Math.round(totalSlots - totalNew)} slots this month are spent on repeat rounds rather than new styles.`;

  const lo = calcNew(days, 0.6, 0.25);
  const hi = calcNew(days, 0.8, 0.4);
  document.getElementById('avg-range').textContent = `${Math.round(lo)} – ${Math.round(hi)} models`;
}

document.getElementById('days').addEventListener('input', e => {
  document.getElementById('days-out').textContent = e.target.value;
  calc();
});
document.getElementById('p2').addEventListener('input', e => {
  document.getElementById('p2-pct').textContent = e.target.value + '%';
  calc();
});
document.getElementById('p3').addEventListener('input', e => {
  document.getElementById('p3-pct').textContent = e.target.value + '%';
  calc();
});

calc();
</script>
</body>
</html>
